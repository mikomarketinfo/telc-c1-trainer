<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELC C1 — PDF-Tests</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f0efe9;--bd:#e2e1d8;--bd2:#c8c7be;
  --tx:#1a1a18;--tx2:#6b6b65;--tx3:#9b9b94;
  --g:#1d9e75;--gl:#e1f5ee;--gd:#0f6e56;
  --p:#7f77dd;--pl:#eeedfe;--pd:#534ab7;
  --b:#378add;--bl:#e6f1fb;--bd3:#185fa5;
  --a:#ba7517;--al:#faeeda;--ad:#633806;
  --r:#e24b4a;--rl:#fcebeb;--rd:#a32d2d;
  --rr:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--bg2:#242420;--bg3:#2c2c28;--bd:#3a3a34;--bd2:#4a4a44;
  --tx:#f0efe9;--tx2:#a0a09a;--tx3:#6b6b65;
  --gl:#0a3020;--gd:#9fe1cb;--pl:#1e1c40;--pd:#afa9ec;
  --bl:#0a1e35;--bd3:#85b7eb;--al:#2a1a05;--ad:#fac775;--rl:#2a0f0f;--rd:#f09595;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px}
.nav{background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;display:flex;align-items:center;overflow-x:auto}
.nav-logo{padding:.8rem 1.1rem;font-weight:700;font-size:15px;white-space:nowrap;border-right:1px solid var(--bd);flex-shrink:0}
.nav-logo span{color:var(--g)}
.main{max-width:960px;margin:0 auto;padding:1.25rem}
.btn{padding:7px 16px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--bg2);color:var(--tx);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{background:var(--bg3)}
.btn.pr{background:var(--g);color:#fff;border-color:var(--g)}.btn.pr:hover{background:var(--gd)}
.btn.sm{padding:4px 11px;font-size:12px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:1.25rem}
.sc{display:none}.sc.on{display:block}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.sh h2{font-size:17px;font-weight:600}

/* TEST PICKER */
.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1.5rem}
.test-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:1rem;cursor:pointer;transition:all .2s;text-align:left}
.test-card:hover{border-color:var(--g);transform:translateY(-2px)}
.test-card .tc-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.test-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.test-card p{font-size:12px;color:var(--tx2);line-height:1.4}
.test-card .tc-done{font-size:11px;margin-top:6px;color:var(--g);font-weight:600}
.pb{height:3px;background:var(--bd);border-radius:99px;margin-top:8px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:var(--g);transition:width .5s}

/* EXAM BAR */
.exam-bar{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:.9rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;position:sticky;top:0;z-index:50}
.exam-bar h3{font-size:14px;font-weight:600}
.exam-bar p{font-size:12px;color:var(--tx2)}
.ep{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-bottom:1rem}
.ef{height:100%;border-radius:99px;background:var(--g);transition:width .3s}

/* LESEN */
.lesen-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:640px){.lesen-grid{grid-template-columns:1fr}}
.text-panel{max-height:500px;overflow-y:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:1.1rem}
.text-panel h4{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem}
.text-panel p{font-size:13.5px;line-height:1.85;margin-bottom:.7rem;color:var(--tx)}
.gap-m{background:var(--pl);color:var(--pd);font-weight:700;padding:1px 5px;border-radius:3px}
.satz-box{margin-top:.9rem;border-top:1px solid var(--bd);padding-top:.75rem}
.satz-box h4{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;margin-bottom:.5rem}
.satz-i{font-size:13px;margin-bottom:5px;color:var(--tx)}

/* QUESTIONS */
.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:.85rem}
.q-num{font-size:10.5px;font-weight:700;color:var(--tx3);margin-bottom:3px}
.q-text{font-size:13px;font-weight:600;margin-bottom:.5rem;color:var(--tx);line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:4px}
.q-opt{padding:6px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg3);font-size:13px;text-align:left;cursor:pointer;transition:all .15s;color:var(--tx);font-family:inherit}
.q-opt:hover{border-color:var(--b);background:var(--bl)}
.q-opt.sel{border-color:var(--p);background:var(--pl);color:var(--pd)}
.q-opt.ok{border-color:var(--g)!important;background:var(--gl)!important;color:var(--gd)!important}
.q-opt.err{border-color:var(--r)!important;background:var(--rl)!important;color:var(--rd)!important}

/* SPRACHBAUSTEINE */
.sb-text{font-size:14px;line-height:2.2;color:var(--tx)}
.sb-q{margin-bottom:1rem;padding:1rem;background:var(--bg3);border-radius:var(--rs);border-left:3px solid var(--p)}
.sb-q .sq-num{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:.5rem}
.sb-q .sq-ctx{font-size:13px;color:var(--tx2);font-style:italic;margin-bottom:.5rem;line-height:1.6}
.sq-opts{display:flex;flex-wrap:wrap;gap:6px}
.sq-opt{padding:5px 13px;border-radius:99px;border:1px solid var(--bd2);background:var(--bg2);font-size:13px;cursor:pointer;transition:all .15s;color:var(--tx);font-family:inherit}
.sq-opt:hover{border-color:var(--p);background:var(--pl);color:var(--pd)}
.sq-opt.sel{border-color:var(--p);background:var(--pl);color:var(--pd);font-weight:600}
.sq-opt.ok{border-color:var(--g)!important;background:var(--gl)!important;color:var(--gd)!important}
.sq-opt.err{border-color:var(--r)!important;background:var(--rl)!important;color:var(--rd)!important}

/* RESULTS */
.result-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rr);padding:1.5rem;text-align:center;margin-bottom:1rem}
.result-score{font-size:56px;font-weight:800;line-height:1}
.result-grade{font-size:17px;font-weight:600;margin:.5rem 0}
.review-list{margin-top:1.5rem}
.rev-item{border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:.75rem;overflow:hidden}
.rev-head{padding:.6rem .9rem;display:flex;align-items:center;gap:.5rem;font-size:13px;font-weight:600}
.rev-head.ok{background:var(--gl);color:var(--gd);border-bottom:none}
.rev-head.err{background:var(--rl);color:var(--rd)}
.rev-body{padding:.75rem .9rem;font-size:13px;line-height:1.7;border-top:1px solid var(--bd)}
.rev-rule{background:var(--al);border-radius:var(--rs);padding:.6rem .9rem;margin-top:.5rem;font-size:12.5px;color:var(--ad)}
.rev-rule strong{display:block;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.tag{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:700;margin-right:4px}
.tg{background:var(--gl);color:var(--gd)}.tp{background:var(--pl);color:var(--pd)}.ta{background:var(--al);color:var(--ad)}.tr{background:var(--rl);color:var(--rd)}

/* VOCAB BOX */
.vocab-note{background:var(--bl);border:1px solid var(--b);border-radius:var(--rs);padding:.75rem 1rem;margin-top:.75rem;font-size:13px}
.vocab-note strong{color:var(--bd3);display:block;margin-bottom:.35rem;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.vw{display:inline-block;margin:.2rem .3rem .2rem 0;padding:2px 9px;border-radius:99px;background:var(--bg3);border:1px solid var(--bd2);font-size:12.5px}

/* INFO BOX */
.info-box{background:var(--al);border:1px solid var(--a);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:.9rem;font-size:13px;color:var(--tx);line-height:1.6}
.info-box strong{color:var(--ad)}

/* TOAST */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rr);padding:10px 16px;font-size:13px;color:var(--tx);box-shadow:0 4px 18px rgba(0,0,0,.11);z-index:9999;transform:translateY(70px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--g);color:var(--gd);background:var(--gl)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">telc <span>C1</span> <small style="font-weight:400;color:var(--tx3)">PDF-Tests</small></div>
  <a href="index.html" style="padding:.8rem 1rem;font-size:13px;color:var(--tx2);text-decoration:none">← Dashboard</a>
</nav>

<main class="main">

<!-- PICKER -->
<div class="sc on" id="s-pick">
  <div class="sh"><h2>📄 Originaltests aus dem Übungsheft</h2></div>
  <div class="info-box">
    <strong>Hinweis:</strong> Diese Tests basieren auf dem echten Übungsmaterial (C1 Allgemein). Nach jedem Test erhältst du eine detaillierte Auswertung mit Erklärungen zu jeder Frage und den wichtigsten Vokabeln.
  </div>
  <div class="test-grid" id="test-grid"></div>
</div>

<!-- ACTIVE TEST -->
<div class="sc" id="s-test">
  <div class="exam-bar">
    <div><h3 id="ex-title">Test</h3><p id="ex-sub"></p></div>
    <div style="display:flex;gap:8px">
      <button class="btn sm pr" onclick="checkTest()">✓ Auswerten</button>
      <button class="btn sm" onclick="goBack()">← Zurück</button>
    </div>
  </div>
  <div class="ep"><div class="ef" id="ex-prog" style="width:0%"></div></div>
  <div id="ex-content"></div>
</div>

<!-- RESULTS -->
<div class="sc" id="s-result">
  <div class="result-box">
    <div class="result-score" id="res-score" style="color:var(--g)">—</div>
    <div class="result-grade" id="res-grade"></div>
    <p style="font-size:13px;color:var(--tx2);margin-top:.5rem" id="res-sub"></p>
  </div>
  <div class="vocab-note" id="res-vocab"></div>
  <div class="review-list" id="res-review"></div>
  <div style="display:flex;gap:8px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
    <button class="btn pr" onclick="goBack()">← Alle Tests</button>
    <button class="btn" onclick="retryTest()">🔄 Nochmal</button>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────
var S={done:{},scores:{}};
function loadS(){try{var d=localStorage.getItem("telc_pdf");if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}renderPicker();}
function saveS(){try{localStorage.setItem("telc_pdf",JSON.stringify(S));}catch(e){}}
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast "+(type||"");t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},2500);}
function go(id){document.querySelectorAll(".sc").forEach(function(e){e.classList.remove("on");});document.getElementById(id).classList.add("on");window.scrollTo(0,0);}
function goBack(){go("s-pick");renderPicker();}

// ── TEST DATA ──────────────────────────────────────
var TESTS=[

  // ── SPRACHBAUSTEINE 1: DAS HANDY ──
  {id:"sb1",type:"Sprachbausteine",title:"Wer hat eigentlich das \"Handy\" erfunden?",
   desc:"22 Mehrfachwahl-Lücken · Wortschatz & Grammatik · C1",
   kind:"sb",
   text:"Jeder kennt es, fast jeder Deutsche hat auch {25}: das Mobiltelefon oder eben \"Handy\". Ob auf der Straße, in Bus oder Bahn, früher oder später hört man überall Sätze wie \"Gib mir mal das Handy!\" – \"Handy\" gehört inzwischen zur deutschen Sprache. Oder?\n\nEine Umfrage hat gezeigt: Die meisten Deutschen (76%) sind der {26}, dass der Begriff \"Handy\" aus dem Englischen {27}. Das ist jedoch falsch. Tatsächlich sind die {28} Sprechenden die einzigen, die ihr Mobiltelefon als Handy bezeichnen. Und das Wort {29} keineswegs aus dem Englischen – dort {30} man das kleine Telefon meist als \"mobile phone\". Dass die Deutschen sich eines englisch klingenden Phantasiewortes {31}, wird von Kulturpessimisten gern als \"ins Absurde {32} Anglomanie\" bezeichnet. Der Begriff \"Handy\" verdanke sich in Wirklichkeit allein der {33}, der Sprache Luthers und Goethes fehlten im Zeitalter der globalen Kommunikation die Worte. Nun kann man darüber {34}, wie Luther sein Mobiltelefon genannt hätte – vermutlich {35} zu keinem vernünftigen Ergebnis in diesem Punkt gelangen.\n\nSicher ist jedoch, dass der Begriff \"Handy\" keine {36} Schöpfung ist. Um dem Ursprung dieses Begriffs etwas {37}, muss man sich ein wenig mit der Sprachgeschichte befassen und zurückschauen in die 1930er Jahre. Zu jener Zeit wurden – zunächst {38} für den militärischen Einsatz – kleine tragbare Funkgeräte entwickelt. Es {39} sich bei diesen Geräten um eine Weiterentwicklung der sogenannten \"Walkie Talkies\". Während {40} meist rucksackgroße Geräte waren, konnte man die neuen Funkgeräte ganz einfach in eine Tasche stecken oder {41} in der Hand tragen. Diese Geräte wurden von Soldaten als \"Handie Talkies\" bezeichnet, und einige amerikanische Soldaten sollen diesen Ausdruck {42} sogar zu \"Handy\" {43}.\n\nIm deutschen Sprachraum tauchte das Handy dann erstmals in einer Anzeige von 1986 auf und {44} damals noch ein kleines Amateurfunkgerät, bevor sich die {45} dann ab 1990 für Mobiltelefone durchsetzte. Der {46} des Handys konnte nicht mehr aufgehalten werden.",
   qs:[
     {n:25,ctx:"fast jeder Deutsche hat auch ___: das Mobiltelefon",opts:["das","ein","eines","es"],ans:"eines",
      exp:"<strong>eines</strong> — unbestimmter Artikel Neutrum im Akkusativ (Genitiv-Attribut: eines davon). \"ein\" wäre Nominativ, \"das\" bestimmter Artikel.",rule:"Unbestimmter Artikel Akk. Neutr. = <em>eines</em> (nicht \"eins\" — das ist Zahlwort ohne Nomen)"},
     {n:26,ctx:"sind der ___, dass der Begriff aus dem Englischen kommt",opts:["Auffassung","Aufnahme","Auslegung","Behauptung"],ans:"Auffassung",
      exp:"<strong>der Auffassung sein, dass</strong> = to be of the opinion. Feste Präposition: <em>der</em> (Genitiv). Behauptung passt grammatisch nicht zu \"der Behauptung sein\".",rule:"Feste Wendung: <em>der Auffassung/Meinung/Ansicht sein, dass…</em> — immer mit Genitiv"},
     {n:27,ctx:"dass der Begriff aus dem Englischen ___",opts:["ableitet","entlehnt","herleitet","kommt"],ans:"kommt",
      exp:"<strong>kommt</strong> — \"aus etw. kommen\" = to come from. \"stammen aus\" wäre auch möglich, aber nicht in den Optionen. \"ableiten\" und \"herleiten\" brauchen reflexives Pronomen.",rule:"<em>aus dem Englischen kommen/stammen</em> = спроисходить из английского"},
     {n:28,ctx:"Tatsächlich sind die ___ Sprechenden die einzigen",opts:["Deutsch","Deutsche","Deutschen","Deutsches"],ans:"Deutsch",
      exp:"<strong>Deutsch</strong> — hier Adjektiv/Sprachbezeichnung als Attribut: \"die Deutsch Sprechenden\" (= diejenigen, die Deutsch sprechen). Kein Artikel → kein -en.",rule:"Sprachbezeichnungen als Partizip-Attribut: <em>die Deutsch Sprechenden</em> (Nomen+Partizip-Konstruktion)"},
     {n:29,ctx:"Und das Wort ___ keineswegs aus dem Englischen",opts:["entreißt","entsteht","folgt","stammt"],ans:"stammt",
      exp:"<strong>stammt</strong> — \"aus etw. stammen\" = to originate from. Feste Präposition: <em>aus</em>.",rule:"<em>stammen aus</em> = происходить из · <em>kommen aus</em> = тоже, но разговорнее"},
     {n:30,ctx:"dort ___ man das kleine Telefon meist als \"mobile phone\"",opts:["bedrückt","bezeichnet","definiert","deutet"],ans:"bezeichnet",
      exp:"<strong>bezeichnet</strong> — \"etw. als etw. bezeichnen\" = to call sth. sth. Festes Strukturmuster mit <em>als</em>.",rule:"<em>etw. als etw. bezeichnen/nennen/betrachten</em> — immer mit <em>als</em> + Nominativ"},
     {n:31,ctx:"Dass die Deutschen sich eines englisch klingenden Phantasiewortes ___",opts:["bedienen","benutzen","gebrauchen","verdienen"],ans:"bedienen",
      exp:"<strong>sich einer Sache bedienen</strong> (Genitiv!) = to make use of sth. \"benutzen/gebrauchen\" brauchen Akkusativ, nicht Genitiv.",rule:"<em>sich einer Sache bedienen</em> (Gen.) = пользоваться чем-л. (книжн., C1)"},
     {n:32,ctx:"gern als \"ins Absurde ___ Anglomanie\" bezeichnet",opts:["gerächte","geführte","getriebene","geworfene"],ans:"geführte",
      exp:"<strong>geführte</strong> — \"ins Absurde führen\" = to take to the absurd → Partizip II als Adjektiv: \"die ins Absurde geführte Anglomanie\".",rule:"Partizip II als Attribut vor Nomen: <em>die geführte</em> (schwache Deklination nach best. Artikel)"},
     {n:33,ctx:"verdanke sich in Wirklichkeit allein der ___",opts:["Annahme","Einstellung","Stellungnahme","Verstellung"],ans:"Annahme",
      exp:"<strong>Annahme</strong> = assumption/premise. Hier: die Annahme, dass der deutschen Sprache Worte fehlten.",rule:"<em>die Annahme</em> = предположение · <em>die Einstellung</em> = установка/отношение · <em>Stellungnahme</em> = позиция"},
     {n:34,ctx:"Nun kann man darüber ___, wie Luther sein Mobiltelefon genannt hätte",opts:["ausbrüten","denken","grübeln","lifteln"],ans:"grübeln",
      exp:"<strong>grübeln</strong> = to brood/ponder. Passt zu \"darüber grübeln, wie…\". \"Denken\" wäre zu allgemein, \"ausbrüten\" ist umgangssprachlich für \"ausdenken\".",rule:"<em>über etw. grübeln</em> = ломать голову над чем-л. (+ Dativ oder \"darüber\")"},
     {n:35,ctx:"– vermutlich ___ zu keinem vernünftigen Ergebnis in diesem Punkt gelangen",opts:["aber man wird","man aber wird","wird man aber","wird aber man"],ans:"wird man aber",
      exp:"<strong>wird man aber</strong> — Nebensatz mit \"vermutlich\" als Modaladverb. Verb \"wird\" steht am Ende des eingeleiteten Infinitivsatzes. Korrekte Wortstellung.",rule:"Modaladverb + Infinitivkonstruktion: \"vermutlich wird man aber … gelangen\" — Verb-End in Infinitivstruktur"},
     {n:36,ctx:"dass der Begriff \"Handy\" keine ___ Schöpfung ist",opts:["rein deutsche","reindeutsche","reine deutsche","reine Deutsche"],ans:"rein deutsche",
      exp:"<strong>rein deutsche</strong> — Adjektiv \"rein\" (= purely) + Adjektiv \"deutsch\" als Attribut. Beide werden klein geschrieben. \"reine Deutsche\" wäre Substantivierung.",rule:"<em>rein</em> als Adverb vor Adjektiv = rein/purely — beide klein, Deklination nur beim letzten Adjektiv"},
     {n:37,ctx:"Um dem Ursprung dieses Begriffs etwas ___, muss man…",opts:["klarzukommen","näherzukommen","zu klären","zu nähern"],ans:"näherzukommen",
      exp:"<strong>näherzukommen</strong> — \"einer Sache näherkommen\" = to get closer to sth. Infinitiv mit \"zu\" bei trennbaren Verben: \"näherzukommen\" (zusammen).",rule:"Trennbare Verben im Infinitiv mit zu: <em>näher|kommen → näher**zu**kommen</em> (zu steht ZWISCHEN Präfix und Verb)"},
     {n:38,ctx:"– zunächst ___ für den militärischen Einsatz – kleine tragbare Funkgeräte",opts:["vorbildlich","vorgezogen","vornehmlich","vortrefflich"],ans:"vornehmlich",
      exp:"<strong>vornehmlich</strong> = primarily/mainly = \"hauptsächlich\". \"Vorbildlich\" = exemplary, \"vortrefflich\" = excellent.",rule:"<em>vornehmlich</em> = hauptsächlich, в первую очередь — typisch für C1-Texte"},
     {n:39,ctx:"Es ___ sich bei diesen Geräten um eine Weiterentwicklung",opts:["belief","ergab","ging","handelte"],ans:"handelte",
      exp:"<strong>handelte</strong> — \"es handelt sich um etw.\" = it concerns / it is a matter of. Feste unpersönliche Konstruktion!",rule:"<em>es handelt sich um + Akk.</em> = речь идёт о чём-л. — FESTE WENDUNG, sehr wichtig für C1"},
     {n:40,ctx:"Während ___ meist rucksackgroße Geräte waren",opts:["Letztere","letztgesagte","letztlich","zuletzt"],ans:"Letztere",
      exp:"<strong>Letztere</strong> (Plural) — bezieht sich auf die zuletzt genannten Dinge (\"Walkie Talkies\"). Nominativ Plural → \"Letztere\".",rule:"<em>Erstere/Letztere</em> = первые/последние (из упомянутых) — Substantivierung, Deklination wie Adjektiv"},
     {n:41,ctx:"konnte man … in eine Tasche stecken oder ___ in der Hand tragen",opts:["also","eben","genau","gerade"],ans:"eben",
      exp:"<strong>eben</strong> = simply / just (in diesem Kontext: \"eben so\" = alternatively). \"Also\" = so/therefore, \"gerade\" = just now/exactly.",rule:"<em>eben</em> als Partikel = просто, именно так — Modalpartikel, sehr typisch C1"},

  // ── LESEVERSTEHEN TEIL 1: EINE BOX VERÄNDERT DIE WELT ──
  {id:"lv1_1",type:"Leseverstehen Teil 1",title:"Eine Box verändert die Welt",
   desc:"6 Satz-Zuordnungen · Textrekonstruktion · C1",
   kind:"lv1",
   text:"Eine gewellte Stahlbox, zwölf Meter lang, drei Meter hoch und genauso breit. Sie ist zum greifbaren Symbol der Globalisierung geworden. Millionen von Containern kreuzen auf immer größeren Schiffen auf den Weltmeeren: <span class=\"gap-m\">(0) z</span>\n\nDer Container hat das Transportwesen revolutioniert. Bis in die 50er Jahre war es üblich, Waren einzeln zu transportieren oder sie in Säcke oder Kisten zu verladen. Für die Hafenarbeiter war das nicht nur Schwerstarbeit. <span class=\"gap-m\">(1)</span>\n\nEs dauerte zehn Tage, bis die \"Warrior\" beladen war – genauso lange, wie die Überfahrt dauerte. Zwar hatte es bereits seit Jahrzehnten Bemühungen gegeben, den Transport effizienter zu gestalten. <span class=\"gap-m\">(2)</span>\n\nAm 26. April 1956 schipperte Malcolm McLean mit einem umgebauten Tanker von Port Newark Richtung Texas. An Bord waren 56 Container. <span class=\"gap-m\">(3)</span> Diese 40-Fuß-Container sind noch heute täglich in Gebrauch.\n\nDass McLean erfolgreich war, lag auch an einem mächtigen Kunden: dem amerikanischen Militär. <span class=\"gap-m\">(4)</span> McLean überzeugte schließlich die Betreiber des Hafens von New York.\n\nHeute reisen rund 90 Prozent der Güter, die über die Meere verschifft werden, in Containern. <span class=\"gap-m\">(5)</span> Der Container reduzierte die Transportkosten enorm. <span class=\"gap-m\">(6)</span> Heute macht er ungefähr die Hälfte des Welthandels aus.",
   satze:[
     {id:"z",t:"z) Smartphones aus China, T-Shirts aus Bangladesch, Bananen aus Nicaragua. (Beispiel)"},
     {id:"a",t:"a) Die Größe, die er für seine Transportbehälter gewählt hatte, wurde zum Standard."},
     {id:"b",t:"b) Dieses erhoffte sich von den Containern logistische Verbesserungen in der Sicherung des Nachschubs."},
     {id:"c",t:"c) Doch sie waren am Streit über die Abmessungen der Container und an streikenden Hafenarbeitern gescheitert."},
     {id:"d",t:"d) Es sollte genau dieser Umstand sein, dem sie in der Folge ihre Beschäftigung verdanken würden."},
     {id:"e",t:"e) Für die Hafenarbeiter war das nicht nur Schwerstarbeit, sondern lebensgefährlich."},

  // ── LESEVERSTEHEN TEIL 3: VERPACKUNGSINDUSTRIE ──
  {id:"lv3_1",type:"Leseverstehen Teil 3",title:"Zukunftsperspektiven für die Verpackungsindustrie",
   desc:"11 Aussagen R/F/NiT + Makroaufgabe · C1",
   kind:"lv3",
   text:"Verbraucher erachten sie als selbstverständlich: die Verpackung. Sie ist aus Kundensicht nicht nur unerlässlich für Transport, sondern auch wesentlich an der Kaufentscheidung beteiligt. Im Unterbewusstsein lenkt die Verpackung unser Kaufverhalten.\n\nDie Verpackung ist aber mehr als eine Verkaufshilfe. Im vergangenen Jahr beschäftigte die deutsche Verpackungsindustrie rund 110.000 Personen und erzielte einen Umsatz von 31,8 Milliarden Euro. Mengenmäßig stellten Verpackungen aus Papier und Pappe mit 48% den größten Anteil. Am umsatzstärksten sind allerdings Kunststoffverpackungen: auf sie entfallen 41% des Gesamtumsatzes. Um im Wettbewerb mit Ländern bestehen zu können, in denen Personalkosten niedrig sind, muss die deutsche Verpackungsindustrie auf Innovation setzen.\n\nAn erster Stelle ist die Transportmöglichkeit zu nennen. Unmittelbar damit verbunden ist der Schutz des verpackten Produktes: Schutz vor Verschmutzung, vor Beschädigung, vor Sauerstoff oder vor Licht. Weiterhin dient die Verpackung der Information und der Selbstdarstellung von Marken.\n\nVerbraucher stellen ständig wachsende Anforderungen an Hygiene und Qualität. So waren etwa Mineralöle in Schokoladenverpackungen aus Karton gefunden worden. In Lebensmittelverpackungen gelangen Mineralöle in der Regel über Druckfarben. Das ließe sich vermeiden, wenn Papier ohne Mineralöle verwendet würde.\n\nDer größte Trend heißt eindeutig Nachhaltigkeit. Kunden fordern recyclebare Verpackungen, die nicht beim Konsumenten bleiben, sondern wiederverwertet werden können. Neue Verpackungen sollen den Bedürfnissen der Konsumenten entsprechen und dabei Umweltverschmutzung vermeiden.\n\nInnovationen gibt es nicht nur in Bezug auf Bequemlichkeit. Auch emotional soll die Verpackung den Kunden ansprechen – über möglichst viele Sinne. Nicht nur das Sehen, sondern auch der Tastsinn ist beteiligt. Den Geruchssinn sprechen Duftetiketten an. Letztes Jahr wurde eine sprechende Verpackung ausgezeichnet: Hält der Kunde einen Stift an eine bestimmte Stelle, wird die Sprachausgabe gestartet. Nur der Geschmackssinn bleibt noch außer vor.\n\nDie Unternehmen müssen sich weiteren Herausforderungen stellen. Flexibilität ist ein wichtiges Schlagwort. Die Unternehmen müssen für anpassungsfähige Produktionsprozesse sorgen, damit sie im Rahmen von Sonderaktionen rasch kleine Mengen neuer Verpackungen liefern können.",

     {n:21,t:"Um für die Konsumenten attraktiv zu sein, sprechen Verpackungen schon heute alle fünf Sinne an.",opts:["+","-","x"],ans:"-",

  // ── LESEVERSTEHEN TEIL 2: SELBERMACHEN ──
  {id:"lv2_1",type:"Leseverstehen Teil 2",title:"Selbermachen als Trend",
   desc:"6 Fragen — in welchem Abschnitt? · C1",
   kind:"lv2",
   text:"<strong style=\"color:var(--b)\">Abschnitt a:</strong> Mach es selbst! \"Do it yourself\" hat heute Hochkonjunktur. Vom Eierwärmer bis zur Stoffserviette muss alles individuell gestaltet sein. Selbermachen schone den Planeten und dämme den Massenkonsum ein, jubeln Aktivisten. Würden Sie, liebe Leser, sich der Meinung anschließen, dass in diesem Fall die Begeisterung ein wenig übertrieben ist? Wie etwa Sauerkraut aus der Dose – das findet man schließlich in jedem Lebensmittelgeschäft.\n\n<strong style=\"color:var(--b)\">Abschnitt b:</strong> Ja, ich gebe zu: Ich bin leicht zufriedenzustellen. Mir schmecken Produkte aus dem Supermarkt. Ich kann diesem Trend durchaus positive Seiten abgewinnen. Mit den eigenen Händen etwas herzustellen kann schließlich dazu beitragen, dass man sich entspannt. Andererseits stört es mich aber gewaltig, wie sehr das Selbermachen heutzutage überhöht wird.\n\n<strong style=\"color:var(--b)\">Abschnitt c:</strong> Das Heimwerken solle das Glücksempfinden erhöhen, den Konsum eindämmen: Solche Behauptungen hört man immer wieder. Denjenigen, die so hohe Erwartungen haben, möchte man entgegenrufen: Schaltet mal einen Gang herunter! Dass Selbermachen den Konsum reduziert, ist durchaus fraglich. Die Industrie hat den Trend erkannt und bietet zahlreiche Produkte in halbfertigem Zustand an. Man könnte behaupten, dass der Konsum durch Heimwerken sogar angekurbelt wird.\n\n<strong style=\"color:var(--b)\">Abschnitt d:</strong> Doch warum ist das Heimwerken eigentlich zum Trend geworden? Wer im Beruf tagein, tagaus am Computer sitzt, sehnt sich irgendwann nach einem Ausgleich. Im Beruf, so eine These des Neurobiologen Gerald Hüther, spüren viele längst nicht mehr die Wichtigkeit ihres Tuns. Zuhause aber haben sie das Sagen.\n\n<strong style=\"color:var(--b)\">Abschnitt e:</strong> Nicht immer reicht die eigene Fantasie aus. Ob sie etwas nähen oder ein neues Bett bauen wollen – online finden Bastler zu jedem Thema eine Anleitung. Durch den Austausch entstehen Communitys. Man könnte annehmen, dass die Menschen sich auf diese Weise näherkommen. Letztlich kommt es womöglich gar nicht darauf an, dass selbstgemachtes Sauerkraut besser schmeckt – sondern darauf, dass man mit anderen darüber reden kann.",

// ── RENDER PICKER ──────────────────────────────────
function renderPicker(){
  var typeColors={
    "Sprachbausteine":"tp","Leseverstehen Teil 1":"tg",
    "Leseverstehen Teil 2":"ta","Leseverstehen Teil 3":"tb"
  };
  document.getElementById("test-grid").innerHTML=TESTS.map(function(t){
    var done=S.done[t.id]||0;
    var score=S.scores[t.id]||0;
    var total=t.qs.length;
    var pct=done?Math.round(score/total*100):0;
    var col=typeColors[t.type]||"tg";
    return "<div class=\"test-card\" onclick=\"startTest('"+t.id+"')\">"+
      "<div class=\"tc-type\"><span class=\"tag "+col+"\">"+t.type+"</span></div>"+
      "<h3>"+t.title+"</h3>"+
      "<p>"+t.desc+"</p>"+
      (done?"<div class=\"tc-done\">✓ "+score+"/"+total+" richtig ("+pct+"%)</div>":"")+
      "<div class=\"pb\"><div class=\"pf\" style=\"width:"+pct+'%\"></div></div>'+
    "</div>";
  }).join("");
}

// ── START TEST ─────────────────────────────────────
var currentTest=null,currentAnswers={};
function startTest(id){
  currentTest=TESTS.find(function(t){return t.id===id;});
  if(!currentTest)return;
  currentAnswers={};
  document.getElementById("ex-title").textContent=currentTest.title;
  document.getElementById("ex-sub").textContent=currentTest.type+" · "+currentTest.qs.length+" Aufgaben";
  document.getElementById("ex-prog").style.width="0%";
  document.getElementById("ex-content").innerHTML=buildTest(currentTest);
  go("s-test");
  window.scrollTo(0,0);
}

function buildTest(t){
  if(t.kind==="sb")return buildSB(t);
  if(t.kind==="lv1")return buildLV1(t);
  if(t.kind==="lv2"||t.kind==="lv3")return buildLV23(t);
  return "";
}

function buildSB(t){
  var qh=t.qs.map(function(q){
    return "<div class=\"sb-q\" id=\"qw-"+q.n+"\">"+
      "<div class=\"sq-num\">Aufgabe "+q.n+"</div>"+
      "<div class=\"sq-ctx\">…"+q.ctx+"…</div>"+
      "<div class=\"sq-opts\">"+q.opts.map(function(o){
        return "<button class=\"sq-opt\" onclick=\"selSB("+q.n+",'"+o+"',this)\">"+o+"</button>";
      }).join("")+"</div>"+
    "</div>";
  }).join("");
  return "<div class=\"info-box\"><strong>Format Sprachbausteine:</strong> Wähle für jede Lücke die richtige Lösung (a, b, c oder d). Beachte den Kontext des Satzes!</div>"+
    "<div class=\"card\" style=\"margin-bottom:1rem\"><div class=\"sb-text\">"+t.text.replace(/\n/g,"<br><br>")+"</div></div>"+
    "<div>"+qh+"</div>";
}

function buildLV1(t){
  var textH="<h4>"+t.title+"</h4>";
  t.text.split("\n").forEach(function(p){if(p.trim())textH+="<p>"+p+"</p>";});
  textH+="<div class=\"satz-box\"><h4>Sätze a–h (2 passen nicht):</h4>";
  t.satze.forEach(function(s){textH+="<div class=\"satz-i\">"+s.t+"</div>";});
  textH+="</div>";
  var qh=t.qs.map(function(q){
    return "<div class=\"q-item\"><div class=\"q-num\">Aufgabe "+q.n+"</div>"+
      "<div class=\"q-text\">"+q.t+"</div>"+
      "<div class=\"q-opts\">"+q.opts.map(function(o){
        return "<button class=\"q-opt\" onclick=\"selQ("+q.n+",'"+o+"',this)\">Satz "+o.toUpperCase()+"</button>";
      }).join("")+"</div></div>";
  }).join("");
  return "<div class=\"info-box\"><strong>Format Teil 1:</strong> Welcher Satz a–h passt in die Lücke? 2 Sätze passen nicht.</div>"+
    "<div class=\"lesen-grid\"><div class=\"text-panel\">"+textH+"</div>"+
    "<div class=\"q-list\">"+qh+"</div></div>";
}

function buildLV23(t){
  var textH="<h4>"+t.title+"</h4>";
  t.text.split("\n").forEach(function(p){if(p.trim())textH+="<p>"+p+"</p>";});
  var qh=t.qs.map(function(q){
    return "<div class=\"q-item\"><div class=\"q-num\">Aufgabe "+q.n+"</div>"+
      "<div class=\"q-text\">"+q.t+"</div>"+
      "<div class=\"q-opts\">"+q.opts.map(function(o){
        return "<button class=\"q-opt\" onclick=\"selQ("+q.n+",'"+o.replace(/'/g,"\\'")+"',this)\">"+o+"</button>";
      }).join("")+"</div></div>";
  }).join("");
  var typeLabel=t.kind==="lv2"?"In welchem Abschnitt a–e findest du die Antwort?":"Richtig (+) / Falsch (–) / Nicht im Text (x)?";
  return "<div class=\"info-box\"><strong>Format "+t.type+":</strong> "+typeLabel+"</div>"+
    "<div class=\"lesen-grid\"><div class=\"text-panel\">"+textH+"</div>"+
    "<div class=\"q-list\">"+qh+"</div></div>";
}

// ── ANSWER SELECTION ───────────────────────────────
function selSB(n,val,btn){
  var wrap=document.getElementById("qw-"+n);
  wrap.querySelectorAll(".sq-opt").forEach(function(b){b.classList.remove("sel");});
  btn.classList.add("sel");
  currentAnswers[n]=val;
  updateProgress();
}
function selQ(n,val,btn){
  btn.closest(".q-item").querySelectorAll(".q-opt").forEach(function(b){b.classList.remove("sel");});
  btn.classList.add("sel");
  currentAnswers[n]=val;
  updateProgress();
}
function updateProgress(){
  var answered=Object.keys(currentAnswers).length;
  var total=currentTest.qs.length;
  document.getElementById("ex-prog").style.width=Math.round(answered/total*100)+"%";
}

// ── CHECK TEST ─────────────────────────────────────
function checkTest(){
  var t=currentTest,ok=0;
  var reviewHTML="<h3 style=\"font-size:14px;font-weight:600;margin-bottom:.75rem;color:var(--tx2)\">📋 Detaillierter Durchgang:</h3>";
  
  t.qs.forEach(function(q){
    var given=currentAnswers[q.n];
    var correct=q.ans;
    var isOk=given&&(given===correct||given.startsWith(correct));
    if(isOk)ok++;
    
    // highlight in UI
    var qEl=null;
    if(t.kind==="sb"){
      qEl=document.getElementById("qw-"+q.n);
      if(qEl)qEl.querySelectorAll(".sq-opt").forEach(function(b){
        if(b.textContent.trim()===correct)b.classList.add("ok");
        if(given&&b.textContent.trim()===given&&!isOk)b.classList.add("err");
      });
    } else {
      document.querySelectorAll(".q-item").forEach(function(item){
        var num=item.querySelector(".q-num");
        if(num&&num.textContent.includes("Aufgabe "+q.n)){
          item.querySelectorAll(".q-opt").forEach(function(b){
            var bv=b.textContent.trim();
            if(bv===correct||bv.startsWith(correct))b.classList.add("ok");
            if(given&&(bv===given||bv.startsWith(given))&&!isOk)b.classList.add("err");
          });
        }
      });
    }
    
    // review item
    var cls=isOk?"ok":"err";
    var icon=isOk?"✓":"✗";
    reviewHTML+="<div class=\"rev-item\">"+
      "<div class=\"rev-head "+cls+"\">"+icon+" Aufgabe "+q.n+(isOk?" — Richtig":" — Falsch (deine Antwort: "+(given||"—")+", richtig: <em>"+correct+"</em>)")+"</div>";
    if(!isOk||true){
      reviewHTML+="<div class=\"rev-body\">"+q.exp+
        "<div class=\"rev-rule\"><strong>📐 Regel / Strategie</strong>"+q.rule+"</div>"+
      "</div>";
    }
    reviewHTML+="</div>";
  });
  
  // save
  S.done[t.id]=(S.done[t.id]||0)+1;
  S.scores[t.id]=ok;
  S.total=(S.total||0)+t.qs.length;
  S.correct=(S.correct||0)+ok;
  saveS();
  
  // show result
  var pct=Math.round(ok/t.qs.length*100);
  var col=pct>=80?"var(--g)":pct>=60?"var(--a)":"var(--r)";
  var grade=pct>=90?"Ausgezeichnet! 🎉":pct>=75?"Sehr gut! 👍":pct>=60?"Gut 👌":pct>=40?"Weiter üben 💪":"Nochmal versuchen 🔄";
  
  document.getElementById("res-score").textContent=ok+"/"+t.qs.length;
  document.getElementById("res-score").style.color=col;
  document.getElementById("res-grade").textContent=grade+" ("+pct+"%)";
  document.getElementById("res-sub").textContent=t.title+" · "+t.type;
  
  // vocab
  document.getElementById("res-vocab").innerHTML="<strong>📚 Wichtige Vokabeln aus diesem Test</strong>"+
    t.vocab.map(function(v){return "<span class=\"vw\">"+v+"</span>";}).join("");
  
  document.getElementById("res-review").innerHTML=reviewHTML;
  go("s-result");
}

function retryTest(){startTest(currentTest.id);}

// ── INIT ───────────────────────────────────────────
loadS();
</script>
